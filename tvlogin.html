<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>TV Login</title>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <style>

        body{

            background:#111;
            color:white;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            flex-direction:column;
            margin:0;

        }

        .container{

            width:320px;
            text-align:center;

        }

        h1{

            margin-bottom:30px;

        }

        input{

            width:100%;
            padding:16px;
            font-size:24px;
            text-align:center;
            border:none;
            border-radius:8px;
            box-sizing:border-box;

        }

        button{

            width:100%;
            margin-top:20px;
            padding:16px;
            font-size:22px;
            cursor:pointer;
            border:none;
            border-radius:8px;
            background:white;

        }

        button:hover{

            opacity:0.9;

        }

        #status{

            margin-top:20px;
            color:#00ff99;
            min-height:24px;

        }

        .error{

            color:#ff6666 !important;

        }

    </style>

</head>

<body>

    <div class="container">

        <h1>TV Login</h1>

        <input
            type="text"
            id="tvCode"
            placeholder="Enter TV Code"
            maxlength="4"
        >

        <button onclick="loginWithGoogle()">

            Login With Google

        </button>

        <div id="status"></div>

    </div>

    <script>

        // FIREBASE CONFIG

        const firebaseConfig = {

            apiKey: "AIzaSyA38dRLuu8WHay3mClSABvCbiLxuuwraV4",

            authDomain: "mediahub-tv-auth.firebaseapp.com",

            projectId: "mediahub-tv-auth",

            storageBucket: "mediahub-tv-auth.firebasestorage.app",

            messagingSenderId: "901749821386",

            appId: "1:901749821386:web:329b8f60dd8ccb4b2e8933"

        };

        // INIT FIREBASE

        firebase.initializeApp(firebaseConfig);

        // FIRESTORE

        const db = firebase.firestore();

        async function loginWithGoogle(){

            const status =
                document.getElementById("status");

            status.classList.remove("error");

            status.innerHTML = "";

            const code =
                document
                .getElementById("tvCode")
                .value
                .trim();

            // VALIDATION

            if(code.length !== 4){

                status.classList.add("error");

                status.innerHTML =
                    "Enter valid 4 digit code";

                return;
            }

            try{

                // GOOGLE PROVIDER

                const provider =
                    new firebase.auth.GoogleAuthProvider();

                // GOOGLE DRIVE ACCESS

                provider.addScope(
                    "https://www.googleapis.com/auth/drive.readonly"
                );

                status.innerHTML =
                    "Opening Google Login...";

                // GOOGLE LOGIN

                const result =
                    await firebase
                    .auth()
                    .signInWithPopup(provider);

                // USER

                const user =
                    result.user;

                if(!user){

                    throw new Error(
                        "Google user not found"
                    );
                }

                // TOKEN

                const accessToken =
                    await user.getIdToken();

                if(!accessToken){

                    throw new Error(
                        "Access token missing"
                    );
                }

                status.innerHTML =
                    "Connecting TV...";

                // UPDATE FIRESTORE

                await db
                    .collection("auth_bridge")
                    .doc(code)
                    .update({

                        access_token:
                            accessToken,

                        refresh_token:
                            "temp_refresh_token",

                        status:
                            "success",

                        updatedAt:
                            firebase
                            .firestore
                            .FieldValue
                            .serverTimestamp()

                    });

                // SUCCESS SCREEN

                document.body.innerHTML = `

                    <div style="
                        display:flex;
                        justify-content:center;
                        align-items:center;
                        height:100vh;
                        flex-direction:column;
                        background:#111;
                        color:white;
                        font-family:Arial;
                        text-align:center;
                    ">

                        <h1>
                            Login Success
                        </h1>

                        <p>
                            You can now return to your TV.
                        </p>

                    </div>

                `;

            }
            catch(error){

                console.error(error);

                status.classList.add("error");

                status.innerHTML =
                    error.message ||
                    "Login Failed";
            }
        }

    </script>

</body>

</html>
