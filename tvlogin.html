<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <title>TV Login</title>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <style>

        body{
            background:#111;
            color:white;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            flex-direction:column;
            margin:0;
        }

        .container{
            width:320px;
            text-align:center;
        }

        h1{
            margin-bottom:30px;
        }

        input{
            width:100%;
            padding:16px;
            font-size:24px;
            text-align:center;
            border:none;
            border-radius:8px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            margin-top:20px;
            padding:16px;
            font-size:22px;
            cursor:pointer;
            border:none;
            border-radius:8px;
            background:white;
        }

        #status{
            margin-top:20px;
            min-height:24px;
            color:#00ff99;
        }

        .error{
            color:#ff6666 !important;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>TV Login</h1>

        <input
            type="text"
            id="tvCode"
            placeholder="Enter TV Code"
            maxlength="4"
        >

        <button onclick="loginWithGoogle()">
            Login With Google
        </button>

        <div id="status"></div>

    </div>

<script>

const firebaseConfig = {

    apiKey: "AIzaSyA38dRLuu8WHay3mClSABvCbiLxuuwraV4",
    authDomain: "mediahub-tv-auth.firebaseapp.com",
    projectId: "mediahub-tv-auth",
    storageBucket: "mediahub-tv-auth.firebasestorage.app",
    messagingSenderId: "901749821386",
    appId: "1:901749821386:web:329b8f60dd8ccb4b2e8933"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

const status =
    document.getElementById("status");

async function loginWithGoogle(){

    status.innerHTML = "";
    status.classList.remove("error");

    const code =
        document.getElementById("tvCode")
        .value
        .trim();

    if(code.length !== 4){

        status.classList.add("error");
        status.innerHTML =
            "Enter valid 4 digit code";

        return;
    }

    localStorage.setItem(
        "tv_code",
        code
    );

    try{

        const provider =
            new firebase.auth.GoogleAuthProvider();

        provider.addScope(
            "https://www.googleapis.com/auth/drive.readonly"
        );

        provider.setCustomParameters({
            prompt: "consent"
        });

        await firebase.auth()
            .signInWithRedirect(provider);

    }
    catch(error){

        console.error(error);

        status.classList.add("error");

        status.innerHTML =
            error.message || "Login Failed";
    }
}

firebase.auth()
.getRedirectResult()
.then(async (result) => {

    if(!result.user){
        return;
    }

    const credential =
        firebase.auth.GoogleAuthProvider
        .credentialFromResult(result);

    if(!credential){

        throw new Error(
            "Google credential missing"
        );
    }

    const accessToken =
        credential.accessToken;

    if(!accessToken){

        throw new Error(
            "Access token missing"
        );
    }

    const code =
        localStorage.getItem(
            "tv_code"
        );

    if(!code){

        throw new Error(
            "TV code missing"
        );
    }

    status.innerHTML =
        "Connecting TV...";

    await db
        .collection("auth_bridge")
        .doc(code)
        .update({

            access_token:
                accessToken,

            refresh_token:
                "bridge_login",

            status:
                "success",

            updatedAt:
                firebase.firestore
                .FieldValue
                .serverTimestamp()

        });

    document.body.innerHTML = `

        <div style="
            background:#111;
            color:white;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            font-family:Arial;
        ">

            <h1>Login Success</h1>

            <p>
                You can now return to TV.
            </p>

        </div>

    `;

})
.catch((error) => {

    console.error(error);

    status.classList.add("error");

    status.innerHTML =
        error.message || "Login Failed";

});

</script>

</body>

</html>
