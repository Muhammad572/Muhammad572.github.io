<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TV Login</title>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <style>
        body{
            background:#111;
            color:white;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            flex-direction:column;
        }

        input{
            padding:15px;
            font-size:22px;
            margin-top:20px;
            width:220px;
            text-align:center;
        }

        button{
            margin-top:20px;
            padding:15px 30px;
            font-size:20px;
            cursor:pointer;
        }

        h1{
            margin-bottom:10px;
        }
    </style>
</head>

<body>

    <h1>TV Login</h1>

    <input
        type="text"
        id="tvCode"
        placeholder="Enter TV Code"
        maxlength="4"
    >

    <button onclick="loginWithGoogle()">
        Login With Google
    </button>

    <script>

        // FIREBASE CONFIG YAHAN DALNI HAI
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);

        const db = firebase.firestore();

        async function loginWithGoogle(){

            const code =
                document.getElementById("tvCode").value;

            if(code.length !== 4){
                alert("Enter valid 4 digit code");
                return;
            }

            const provider =
                new firebase.auth.GoogleAuthProvider();

            provider.addScope(
                'https://www.googleapis.com/auth/drive.readonly'
            );

            try{

                const result =
                    await firebase.auth()
                    .signInWithPopup(provider);

                const credential =
                    firebase.auth.GoogleAuthProvider
                    .credentialFromResult(result);

                const accessToken =
                    credential.accessToken;

                await db
                    .collection("auth_bridge")
                    .document(code)
                    .update({
                        access_token: accessToken,
                        status: "success"
                    });

                document.body.innerHTML =
                    "<h1>Login Success</h1><p>You can now return to TV.</p>";

            }catch(error){

                console.log(error);

                alert(error.message);
            }
        }

    </script>

</body>
</html>
